<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded background -->
  <rect width="200" height="200" rx="44" fill="#0f5c2e"/>

  <!-- Left page of open Quran -->
  <path d="M100 60 C82 58 50 64 30 76 L30 144 C50 135 82 132 100 134 Z" fill="white"/>

  <!-- Right page (slightly off-white for depth) -->
  <path d="M100 60 C118 58 150 64 170 76 L170 144 C150 135 118 132 100 134 Z" fill="#dff0e8"/>

  <!-- Binding shadow -->
  <line x1="100" y1="60" x2="100" y2="134" stroke="#0f5c2e" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Gold ornamental dot at binding top -->
  <circle cx="100" cy="57" r="8" fill="#c9a227"/>
  <circle cx="100" cy="57" r="4" fill="#0f5c2e"/>

  <!-- Text lines — left page -->
  <line x1="50"  y1="92"  x2="90" y2="88"  stroke="#0f5c2e" stroke-width="2.5" stroke-linecap="round" opacity="0.22"/>
  <line x1="47"  y1="105" x2="90" y2="101" stroke="#0f5c2e" stroke-width="2.5" stroke-linecap="round" opacity="0.22"/>
  <line x1="47"  y1="118" x2="90" y2="114" stroke="#0f5c2e" stroke-width="2.5" stroke-linecap="round" opacity="0.22"/>
  <line x1="54"  y1="130" x2="90" y2="127" stroke="#0f5c2e" stroke-width="2"   stroke-linecap="round" opacity="0.18"/>

  <!-- Text lines — right page -->
  <line x1="110" y1="88"  x2="150" y2="92"  stroke="#0f5c2e" stroke-width="2.5" stroke-linecap="round" opacity="0.22"/>
  <line x1="110" y1="101" x2="153" y2="105" stroke="#0f5c2e" stroke-width="2.5" stroke-linecap="round" opacity="0.22"/>
  <line x1="110" y1="114" x2="153" y2="118" stroke="#0f5c2e" stroke-width="2.5" stroke-linecap="round" opacity="0.22"/>
  <line x1="110" y1="127" x2="146" y2="130" stroke="#0f5c2e" stroke-width="2"   stroke-linecap="round" opacity="0.18"/>

  <!-- Gold 8-pointed star at bottom centre (decorative) -->
  <g transform="translate(100, 157)">
    <polygon points="0,-9 2.5,-2.5 9,0 2.5,2.5 0,9 -2.5,2.5 -9,0 -2.5,-2.5"
             fill="#c9a227" opacity="0.85"/>
    <polygon points="0,-9 2.5,-2.5 9,0 2.5,2.5 0,9 -2.5,2.5 -9,0 -2.5,-2.5"
             fill="#c9a227" opacity="0.85" transform="rotate(45)"/>
  </g>
</svg>
